name: KeyFobBatteryTracker
options:
  bundleIdPrefix: com.shimondeitel.fobbattery
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  KeyFobBatteryTracker:
    type: application
    platform: iOS
    sources:
      - path: KeyFobBatteryTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fobbattery
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: KeyFobBatteryTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KeyFobBatteryTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KeyFobBatteryTrackerTests
      - path: KeyFobBatteryTracker.storekit
    dependencies:
      - target: KeyFobBatteryTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fobbattery.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KeyFobBatteryTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KeyFobBatteryTrackerUITests
    dependencies:
      - target: KeyFobBatteryTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fobbattery.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  KeyFobBatteryTracker:
    build:
      targets:
        KeyFobBatteryTracker: all
        KeyFobBatteryTrackerTests: [test]
        KeyFobBatteryTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: KeyFobBatteryTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: KeyFobBatteryTracker.storekit
      targets:
        - KeyFobBatteryTrackerTests
        - KeyFobBatteryTrackerUITests
    archive:
      config: Release
