<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Key Fob Battery Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0E1F2E; color:#fff; font-family:-apple-system,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .wrap { max-width:560px; }
  h1 { color:#3E7CB1; font-size:2rem; margin-bottom:0.5rem; }
  p { color:rgba(255,255,255,0.75); line-height:1.5; }
  a { color:#3E7CB1; }
  .badge { display:inline-block; margin-top:2rem; padding:10px 20px; border:1px solid #3E7CB1; border-radius:8px; color:#3E7CB1; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #3E7CB155 0%, #3E7CB100 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Key Fob Battery Tracker</h1>
  <p>Remember when you last replaced your key fob battery.</p>
  <p>Free tier: Single fob battery replacement date log. Pro: Multi-fob/vehicle tracking with battery type notes.</p>
  <div class="badge">Available on iOS</div>
  <p style="margin-top:3rem;"><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
</div>
</body>
</html>
